workflows:
  nexwall_x_ultimate:
    name: NexWall X Ultimate CI/CD
    max_build_duration: 120

    environment:
      android_signing:
        - keystore_reference

      vars:
        PACKAGE_NAME: "com.aistudio.nexwallx.ykpwzt"
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx2g"

      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Set up Gradle permissions
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Decode secrets (if using env file)
        script: |
          echo "$ENV_FILE" > .env || true

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
      - build/reports/**

    publishing:
      email:
        recipients:
          - your-email@example.com
