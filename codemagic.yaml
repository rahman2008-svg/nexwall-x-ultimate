workflows:
  nexwall_x_ultimate:
    name: NexWall X Ultimate (Debug Build)
    max_build_duration: 120

    environment:
      java: 17

      vars:
        PACKAGE_NAME: "com.aistudio.nexwallx.ykpwzt"
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dkotlin.daemon.jvm.options=-Xmx2g"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Make gradlew executable
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
      - build/reports/**

    publishing:
      email:
        recipients:
          - your-email@example.com
